[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/moderate"
  to = "/.netlify/functions/moderate"
  status = 200

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Runs 4x daily at 7am, 11am, 3pm, 7pm Pacific
# After July 1 2026, function skips if today already has a post
[functions."daily-blog"]
  schedule = "0 14,18,22,2 * * *"

# Daily video additions at 3pm UTC — adds 4–6 curated videos per day
# Rotates across all audiences: youth, parent, kinship, worker, all
[functions."daily-videos"]
  schedule = "0 15 * * *"
